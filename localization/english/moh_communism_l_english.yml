l_english:
  china_communism.1.t: "Communist Uprising"
  china_communism.1.d: "Communists in [SCOPE.sState('jiangxi_scope').GetName] have launched an uprising"
  china_communism.1.f: "Radical communists in [SCOPE.sState('jiangxi_scope').GetName] have risen up. They promote land revolution and workers' councils, calling on poor farmers and disillusioned soldiers to join their cause. Local order quickly deteriorates, with red flags flying over villages and forests. For the authorities, this is both a rebellion and a new political threat—whether to swiftly crush it with military force or let it retreat into the mountains and become a difficult-to-eradicate guerrilla force, is a choice that lies before them."
  china_communism.1.a: "Crush the Communists"
  china_communism.1.b: "Go mountainous and fight guerrilla warfare"
  from_ccp_land_revolution_ig: "Land Revolution"
  china_communism.2.t: "Canton Coup"
  china_communism.2.d: "[SCOPE.sState('canton_scope').GetCityHubName] has experienced a political crisis, with tensions escalating"
  china_communism.2.f: "Some [GetIdeology('ideology_moh_kmt').GetName] believe that [ROOT.GetCountry.GetName] is at risk of being radicalized by communism. To address the potential rebellion, the leadership has decided to impose martial law on Guangzhou and dispatch loyal forces to control the naval vessels, arrest suspected conspirators, and surround political organizations linked to external forces.\n\nThis move quickly stabilized the situation, but also deepened internal divisions within the party, exposing the contradictions in the government's policy towards communism. Although the incident appears to be under control on the surface, underlying tensions remain."
  china_communism.2.a_tt: "This move will cause internal divisions within the [GetIdeology('ideology_moh_kmt').GetName], and communists may turn to violence..."
  china_communism.2.b_tt: "The country may be at risk of being radicalized by communism..."
  je_anti_encirclement_complete_tt: "Nationalist forces win #variable 1%#! times in encirclement or Communist forces win #variable 5%#! times in anti-encirclement"
  je_anti_encirclement_status: "#blue Nationalist#! victories: #variable [GetGlobalVariable('moh_china_civil_war_score_kmt').GetValue]#! times; #red Communist#! victories: #variable [GetGlobalVariable('moh_china_civil_war_score_ccp').GetValue]#! times"
  je_anti_encirclement_status_countdown: "The war will begin in #variable [GetGlobalVariable('moh_china_civil_war_cooldown_months').GetValue]#! months"
  china_communism.3.t: "Communist Retreats Westward"
  china_communism.3.d: "Communist forces are retreating westward"
  china_communism.3.f: "Our encirclement campaign has been successful, forcing the communists to retreat westward.\n\nAlthough we have successfully struck them down, they remain a tenacious enemy who may rise again in the future. We must remain vigilant and continue strengthening our military and intelligence networks to ensure the nation's security and stability."
  china_communism.3.a: "Notable Progress"
  china_communism.4.t: "The Long March"
  china_communism.4.d: "We are forced to undertake the Long March"
  china_communism.4.f: "Although we have suffered heavy losses, we have successfully preserved the revolutionary spark. The Long March is not only a military campaign but also a spiritual level up, forging our indomitable will and unity. We will continue to adhere to the revolutionary path and ultimately achieve our goals."
  china_communism.4.a: "Continue to Uphold the Revolutionary Path"
  china_communism.4.a_tt: "The soviet base will be relocated to [SCOPE.sState('shaanxi_scope').GetName]."