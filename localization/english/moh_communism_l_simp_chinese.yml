l_simp_chinese:
  china_communism.1.t: "共产主义者起义"
  china_communism.1.d: "共产党人在[SCOPE.sState('jiangxi_scope').GetName]发动了起义"
  china_communism.1.f: "共产党的激进分子在[SCOPE.sState('jiangxi_scope').GetName]揭竿而起。他们宣扬土地革命与工农政权，号召贫苦农民与失意士兵加入他们的队伍。地方秩序迅速动荡，红色旗帜在乡村与山林间飘扬。对于当局而言，这既是一场叛乱，也是一种新的政治威胁——是迅速出兵围剿，还是任其退入山林、化为难以扑灭的游击火种，成为摆在眼前的抉择。"
  china_communism.1.a: "围剿共匪"
  china_communism.1.b: "上山打游击"
  from_ccp_land_revolution_ig: "土地革命"
  china_communism.2.t: "中山舰事件"
  china_communism.2.d: "[SCOPE.sState('canton_scope').GetCityHubName]发生一起政治风波，局势紧张"
  china_communism.2.f: "部分[GetIdeology('ideology_moh_kmt').GetName]认为[ROOT.GetCountry.GetName]有被共产主义赤化风险。为应对可能的叛乱，高层决定对广州实施戒严，并派遣忠诚部队控制海军舰只，逮捕涉嫌密谋的军官，并包围与外部势力相关的党派组织。\n\n此举迅速控制了局势，但也加深了党内的分裂，暴露了政府在容共政策上的矛盾。尽管表面上事件平息，但仍暗流涌动。"
  china_communism.2.a: "暴力解决此事"
  china_communism.2.b: "继续与他们合作"
  china_communism.2.a_tt: "此举将会造成[GetIdeology('ideology_moh_kmt').GetName]内部分裂，共产党人士可能会转向暴力手段……"
  china_communism.2.b_tt: "国家将来可能有被赤化的风险……"
  je_anti_encirclement_complete_tt: "国军赢得#variable 1#!次围剿或共军赢得#variable 5#!次反围剿"
  je_anti_encirclement_status: "#blue 国军#!胜利次数：#variable [GetGlobalVariable('moh_china_civil_war_score_kmt').GetValue]#!次；#red 共军#!胜利次数：#variable [GetGlobalVariable('moh_china_civil_war_score_ccp').GetValue]#!次"
  china_communism.3.t: "共军向西逃窜"
  china_communism.4.t: "长征"
